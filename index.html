<script>
function abrirVentana(url, titulo) {
    var ancho = 1000;
    var alto = 600;
    var izquierda = (screen.width - ancho) / 2;
    var arriba = (screen.height - alto) / 2;
    
    var ventana = window.open(
        url,
        titulo,
        'width=' + ancho + 
        ',height=' + alto + 
        ',left=' + izquierda + 
        ',top=' + arriba + 
        ',scrollbars=yes,resizable=yes'
    );
    
    if (ventana) {
        ventana.focus();
    } else {
        alert('Por favor, permite las ventanas emergentes');
    }
}
</script>
